# syntax=toml

[options]

horizontal_mouse_warp = -1
mouse_follows_focus = true
focus_follows_mouse = true
preset_column_widths = [ 0.40, 0.50, 0.60, 1.00 ]

# Animation speed in 1/10th of display resolution per second.
# E.g. a value of 20 means: move at a speed of two display sizes per second.
# To disable animations, leave this unset or set to a very large value.
animation_speed = 30

# Automatically center the focused window when switching focus with keyboard,
# i.e. 'window_focus_west' or 'window_focus_east'.
auto_center = false
disable_native_tabs = false
virtual_workspace_animations = true
window_resize_cycle = false
# mouse_resize_modifier = "cmd + "

[padding]
top = 12
bottom = 12

[swipe]
sensitivity = 0.35
deceleration = 20.0
continuous = true

[swipe.gesture]
fingers_count = 4
direction = "Natural"
vertical = false

[swipe.scroll]
modifier = "cmd + alt + ctrl"
# vertical_modifier = "alt"

[restore]
enabled = false
startup_grace_ms = 2000
missing_windows = "ignore"

[decorations]
workspace_menu_status = false
workspace_popup_status = true

[decorations.inactive.dim]
opacity = 0
opacity_night = 0

[decorations.active.border]
enabled = false
color = "#89b4fa"
width = 0.0
radius = 12.0

[bindings]
# horizontal movement
window_focus_west = "cmd + alt + ctrl - leftarrow"
window_focus_east = "cmd + alt + ctrl - rightarrow"
window_swap_west = "cmd + alt + ctrl + shift - leftarrow"
window_swap_east = "cmd + alt + ctrl + shift - rightarrow"
window_swap_north = "cmd + alt + ctrl + shift - l"
window_swap_south = "cmd + alt + ctrl + shift - h"
window_snap = "cmd + shift + alt - f"
window_togglefloatlayer = "cmd + alt + ctrl - a"

# vertical (workspace) movement
window_virtual_north = "cmd + alt + ctrl - uparrow"
window_virtual_south = "cmd + alt + ctrl - downarrow"
window_virtualmove_north = "cmd + alt + ctrl + shift - uparrow"
window_virtualmove_south = "cmd + alt + ctrl + shift - downarrow"
window_virtualnum_1 = "cmd + alt + ctrl - 1"
window_virtualnum_2 = "cmd + alt + ctrl - 2"
window_virtualnum_3 = "cmd + alt + ctrl - 3"
window_virtualnum_4 = "cmd + alt + ctrl - 4"
window_virtualnum_5 = "cmd + alt + ctrl - 5"
window_virtualnum_6 = "cmd + alt + ctrl - 6"
window_virtualmovenum_1 = "cmd + alt + ctrl + shift - 1"
window_virtualmovenum_2 = "cmd + alt + ctrl + shift - 2"
window_virtualmovenum_3 = "cmd + alt + ctrl + shift - 3"
window_virtualmovenum_4 = "cmd + alt + ctrl + shift - 4"
window_virtualmovenum_5 = "cmd + alt + ctrl + shift - 5"
window_virtualmovenum_6 = "cmd + alt + ctrl + shift - 6"

# column resizing
window_grow = "cmd + alt + ctrl - c"
window_shrink = "cmd + alt + ctrl + shift - c"
window_fullwidth = "cmd + alt + ctrl + shift - f"

# Toggles the window for management. If unmanaged, the window will be "floating".
window_manage = "cmd + alt + ctrl - t"

# column stacking
window_stack = "cmd + alt + ctrl - ["
window_unstack = "cmd + alt + ctrl + shift - ["

# Moves currently focused window to the next display.
window_nextdisplay = "cmd + alt + ctrl + shift - ]"

# Moves the mouse pointer to the next display.
mouse_nextdisplay = "cmd + alt + ctrl - ]"

# Size stacked windows in the column to equal heights.
# window_equalize = "alt + shift - e"

# Window properties, matched by a RegExp title string.
[windows]

[windows.pip]
# Title RegExp pattern is required.
title = "Picture.*(in)?.*[Pp]icture"
# Do not manage this window, e.g. it will be floating.
floating = true

[windows.neovide]
# Matches an editor by title and always inserts its window at index 1,
# a specific initial width (as a ratio of display width),
# and let some bindings pass through.
# Note: bundle_id is optional. Some apps (e.g. plain binaries) do not
# report one, so matching by title alone is often more reliable.
title = "Neovide.*"
index = 1
width = 0.5
bindings_passthrough = ["ctrl-h", "ctrl-l"]

[windows.popup]
# Matches a popup and silently appends it at the end.
title = "Unimportant popup window"
dont_focus = true
index = 100

# [windows.passwords]
# # Floating window placed on a grid. The format is "cols:rows:x:y:w:h".
# # This divides the display into a 6x6 grid and places the window at cell (1,1)
# # spanning 4 columns and 4 rows — roughly centered covering 2/3 of the display.
# title = "Passwords.*"
# floating = false
# grid = "6:6:1:1:4:4"

[windows.ableton]
bundle_id = "com.ableton.live"
title = ".*"
manage = true

[windows.td]
bundle_id = "ca.derivative.TouchDesigner"
title = ".*"
manage = true

[windows.calculator]
title = ".*"
bundle_id = "com.apple.calculator"
floating = true

[windows.finder-info]
title = ".* Info"
bundle_id = "com.apple.finder"
floating = true

[windows.music]
title = ".*"
bundle_id = "com.apple.Music"
width = 0.75

[windows.all]
# Matches all windows and adds a few pixels of spacing to their borders.
# Note: horizontal_padding and vertical_padding create gaps on all sides of
# each window. At screen edges, the gap is cancelled out so padding only
# appears between windows. Use the [options] padding_* settings above to
# control screen edge margins independently.
title = ".*"
horizontal_padding = 6
vertical_padding = 0
width = 0.5
