[mgr]
linemode = "size_and_mtime"
show_hidden = false
mouse_events = ["click", "scroll", "touch", "move", "drag"]

[open]
rules = [
  # Folder
  { url = "*/", use = [
    "edit",
    "open",
    "reveal",
  ] },
  # Text
  { mime = "text/*", use = [
    "edit",
    "reveal",
  ] },
  # Image
  { mime = "image/*", use = [
    "open",
    "reveal",
  ] },
  # Media
  { mime = "{audio,video}/*", use = [
    "play",
    "reveal",
  ] },
  # Archive
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
    "extract",
    "reveal",
  ] },
  # JSON
  { mime = "application/{json,ndjson}", use = [
    "edit",
    "reveal",
  ] },
  { mime = "*/javascript", use = [
    "edit",
    "reveal",
  ] },
  # Empty file
  { mime = "inode/empty", use = [
    "edit",
    "reveal",
  ] },
  # Virtual file system
  { mime = "vfs/{absent,stale}", use = "download" },
  # Fallback
  { url = "*", use = [
    "open",
    "reveal",
  ] },
]

[opener]
play = [
  { run = "xdg-open %s", orphan = true, for = "unix" },
  { run = "losslesscut %s", orphan = true, for = "unix" },
  { run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Show media info", for = "unix" },
]
image = [
  { run = "satty -f %s", orphan = true, for = "unix" },
  { run = "imv %s", orphan = true, for = "unix" },
  { run = "krita %s", orphan = true, for = "unix" },
  { run = "gimp %s", orphan = true, for = "unix" },
]
extract = [{ run = "ya pub extract --list %s", desc = "Extract here" }]
edit = [{ run = 'neovide "$@" --frame none', block = false, for = "unix" }]
download = [
  { run = "ya emit download --open %S", desc = "Download and open" },
  { run = "ya emit download %S", desc = "Download" },
]

[[plugin.prepend_fetchers]]
id = "git"
name = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
name = "*/"
run = "git"

[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'

[[plugin.prepend_previewers]]
url = "*/"
run = "eza-preview"
