# check keycodes: https://github.com/xkbcommon/libxkbcommon/blob/master/include/xkbcommon/xkbcommon-keysyms.h
# constants
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser
$mainMod = SUPER
$passwordManager = keepassxc
$launcher = vicinae toggle
$music = cider

unbind = $mainMod, T
unbind = $mainMod CTRL, S 
unbind = $mainMod, PRINT
unbind = $mainMod, D
# unbind = $mainMod, V
unbind = $mainMod, C

# system
bindd = $mainMod, grave, Omarchy menu, exec, omarchy-menu
bindd = $mainMod SHIFT, N, Toggle nightlight, exec, omarchy-toggle-nightlight
bind = $mainMod SHIFT, M, exec, /home/dokxid/dotfiles/hypr/.config/hypr/scripts/toggle_decorations.sh
# bindd = $mainMod CTRL, M, logout, exec, uwsm stop

# capture
# bindd = $mainMod CTRL, R, Screenshot with Editing, exec, omarchy-cmd-screenshot
# bindd = $mainMod, R, Screenshot to Clipboard, exec, omarchy-cmd-screenshot smart clipboard
# bindd = $mainMod CTRL, E, Screenrecording, exec, omarchy-menu screenrecord
bindd = $mainMod CTRL, PRINT, Color picking, exec, pkill hyprpicker || hyprpicker -a

# layout
bind = $mainMod, mouse_up, layoutmsg, rollprev
bind = $mainMod, mouse_down, layoutmsg, rollnext
# bind = $mainMod, mouse_up, changegroupactive, b
# bind = $mainMod, mouse_down, changegroupactive, f
bind = $mainMod, bracketleft, layoutmsg, rollnext
bind = $mainMod, bracketright, layoutmsg, 

# workspaces
# bindd = $mainMod, TAB, Next workspace, workspace, m+1
# bindd = $mainMod SHIFT, TAB, Previous workspace, workspace, m-1
bindd = $mainMod CTRL, right, Next workspace, workspace, m+1
bindd = $mainMod CTRL, left, Previous workspace, workspace, m-1
bindd = $mainMod CTRL, L, toggle special workspace, togglespecialworkspace, main
bindd = $mainMod SHIFT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
bindd = $mainMod CTRL ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = $mainMod CTRL ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r

# Move active window to a workspace with SUPER + SHIFT + [1-9; 0]
bindd = SUPER SHIFT ALT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT ALT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT ALT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT ALT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT ALT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT ALT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT ALT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT ALT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT ALT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT ALT, code:19, Move window to workspace 10, movetoworkspace, 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
bindd = SUPER SHIFT, code:10, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT, code:11, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT, code:12, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT, code:13, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT, code:14, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT, code:15, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT, code:16, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT, code:17, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT, code:18, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# windows control
bindd = $mainMod, T, Toggle window floating/tiling, togglefloating,
bindd = $mainMod, Q, Kill active window, exec, /home/dokxid/dotfiles/hypr/.config/hypr/scripts/killactive.sh
bindd = $mainMod SHIFT, Q, Close active window, closewindow, activewindow
bindd = $mainMod CTRL, F11, full width, fullscreen, 1
bindd = $mainMod, F11, full screen, fullscreen, 0
bindd = $mainMod CTRL, BACKSPACE, Toggle window transparency, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle
bindd = $mainMod, LEFT, Move window focus left, movefocus, l
bindd = $mainMod, RIGHT, Move window focus right, movefocus, r
bindd = $mainMod, UP, Move window focus up, movefocus, u
bindd = $mainMod, DOWN, Move window focus down, movefocus, d
bind = $mainMod, LEFT, alterzorder, top
bind = $mainMod, RIGHT, alterzorder, top
bind = $mainMod, UP, alterzorder, top
bind = $mainMod, DOWN, alterzorder, top

# app launch
bind = $mainMod, D, exec, pkill -SIGUSR1 wayscriber
bind = $mainMod CTRL, S, exec, ambxst run tools
bindd = $mainMod CTRL, O, opencode, exec, omarchy-launch-tui opencode
bindd = $mainMod, SPACE, open launcher, exec, $launcher
bindd = $mainMod, RETURN, terminal, exec, $terminal --dir="$(~)"
bindd = $mainMod CTRL, F, nautilus, exec, uwsm-app -- nautilus --new-window
bindd = $mainMod, F, yazi, exec, omarchy-launch-tui yazi
bindd = $mainMod, B, browser, exec, $browser
bindd = $mainMod, M, music, exec, omarchy-launch-or-focus $music
bindd = $mainMod, period, vesktop, exec, omarchy-launch-or-focus vesktop
bindd = $mainMod, E, neovide, exec, uwsm-app -- neovide
bindd = $mainMod, DELETE, btop, exec, omarchy-launch-tui btop
bindd = $mainMod, O, obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian --enable-wayland-ime"
bindd = $mainMod, SLASH, passwords, exec, omarchy-launch-or-focus $passwordManager
bindd = $mainMod ALT, RETURN, tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = $mainMod CTRL, I, figma, exec, omarchy-launch-or-focus-webapp "https://figma.com/"
bindd = $mainMod CTRL ALT, M, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
