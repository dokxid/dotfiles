# Extra autostart processes
# exec-once = uwsm-app -- my-service

# see: https://wiki.hypr.land/FAQ/#some-of-my-apps-take-a-really-long-time-to-open
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /home/dokxid/dotfiles/hypr/.config/hypr/scripts/restart-portals.sh

# desktop environment related stuff
exec-once = hyprpm reload -n
exec-once = killall waybar
exec-once = quickshell &

# mount drives
exec-once = mount /dev/nvme0n1p3 /run/media/storage/nvme0n1p3 &

# fix xwayland cursor not showing up
exec-once = xsetroot -cursor_name left_ptr

# open vestop on ws4
exec-once = [workspace 3 silent; monitor DP-3] firefox
exec-once = [workspace 4 silent; monitor HDMI-A-1] vesktop
exec-once = [workspace special:scratchpad silent; monitor HDMI-A-1] keepassxc
exec-once = [workspace 9 silent] steam

# opencode server for nvim integration
# exec-once = opencode serve --port 4096
