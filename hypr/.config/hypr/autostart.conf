# desktop environment related stuff
exec-once = hyprpm reload -n

# background
exec-once = uwsm-app -- hypridle
exec-once = uwsm-app -- mako
exec-once = uwsm-app -- fcitx5 --disable notificationitem
exec-once = uwsm-app -- swayosd-server
exec-once = omarchy-cmd-first-run
exec-once = omarchy-powerprofiles-init
exec-once = uwsm-app -- omarchy-hyprland-monitor-watch

# see: https://wiki.hypr.land/FAQ/#some-of-my-apps-take-a-really-long-time-to-open
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all
exec-once = /home/dokxid/dotfiles/hypr/.config/hypr/scripts/restart-portals.sh

# mount drives
# exec-once = mount /dev/sdc2 ~/media/seagate &

# fix xwayland cursor not showing up
exec-once = xsetroot -cursor_name left_ptr

# open vestop on ws4
exec-once = [workspace 1 silent; monitor DP-3] zen-browser
exec-once = [workspace 4 silent; monitor HDMI-A-1] vesktop
exec-once = [workspace special:scratchpad silent; float] keepassxc
exec-once = [workspace special:scratchpad silent; float] thunderbird
exec-once = [workspace 9 silent; float] steam
