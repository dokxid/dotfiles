[bar.main]
start = ["workspaces", "gap", "taskbar"]
icon_color = "on_surface"
center = ["clock"]
end = [
  "group:middle",
  "gap",
  "group:systray",
  "gap",
  "tray",
  "gap",
  "notifications",
]

[[bar.main.capsule_group]]
members = ["weather", "gap2x", "date"]
id = "middle"
fill = "on_primary"
foreground = "primary"
padding = 24.0
enabled = true

[[bar.main.capsule_group]]
id = "systray"
members = ["network", "bluetooth", "volume"]
fill = "on_primary"
foreground = "primary"
padding = 16.0
enabled = true

[widget.notifications]
capsule = true
capsule_padding = 16
capsule_fill = "primary"
icon_color = "on_primary"
capsule_foreground = "on_primary"

[widget.gap]
type = "spacer"
length = 12

[widget.gap2x]
type = "spacer"
length = 24

[widget.taskbar]
group_by_workspace = true
show_all_outputs = false
only_active_workspace = false
show_workspace_label = true
scale = 1.3
workspace_label_placement = "inside"
hide_empty_workspaces = false
workspace_group_capsule = true
group_single_icon_per_app = true
show_active_indicator = true
active_opacity = 1.0
inactive_opacity = 0.8
focused_output_only = true

[widget.workspaces]
display = "name"                  # none | id | name
minimal = false                   # true = text-only labels, no animated pills
max_label_chars = 8               # truncate long workspace names (e.g. "VESKTOP" → "VE")
labels_only_when_occupied = false # (1) (2*) ( ) (4) - occupied tags and the active tag show labels (*active but empty)
scale = 1.2
hide_when_empty = false
pill_scale = 1.5
active_pill_size = 2.2
inactive_pill_size = 1.0
focused_color = "primary"
occupied_color = "secondary"
empty_color = "surface_variant"
focused_output_only = true        # true = only the focused monitor highlights its active workspace

[widget.volume]
show_label = false

[widget.network]
show_label = false

[widget.tray]
capsule = true
scale = 1.2
capsule_fill = "on_primary"
icon_color = "primary"
padding = 16.0
hidden = [
  "nm-applet",
  "blueman",
  "org.kde.StatusNotifierItem-1-1",
  "tailscale",
  "keepassxc",
]

[widget.clock]
scale = 1.2
format = "{:%H:%M}"
capsule_fill = "primary"
capsule_foreground = "on_primary"
capsule = true
capsule_padding = 16

[widget.weekday]
type = "clock"
scale = 1.2
format = "KW {:%W - %a}\n{:%d.%m.%Y}"

[widget.date]
type = "clock"
scale = 1.3
format = "KW {:%W - %a}\n{:%d.%m.%Y}"

[widget.weather]
scale = 1
max_length = 180
show_condition = true
show_temperature = true
